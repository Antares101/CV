schema: spec-driven

context: |
  Tech stack: Astro v4 (static), SolidJS (islands), TailwindCSS v3, TypeScript
  Architecture: Component-based (Astro .astro + Solid .tsx islands), YAML data-driven
  Testing: None detected (no test runner in package.json)
  Style: Persona 5 theme — dark mode default, red/black palette, angular borders, gaming aesthetic
  i18n: Bilingual (en/es) via custom ui.ts module
  Deployment: Static site (GitHub Pages / Netlify)

rules:
  proposal:
    - Include rollback plan for risky changes
    - Prioritize native CSS/Solid solutions over heavy libraries
  specs:
    - Use Given/When/Then for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
    - Document animation timing (duration, easing, delay) with concrete values
  design:
    - Include sequence diagrams for complex animation flows
    - Document architecture decisions with rationale (especially library choice)
    - Specify mobile behavior explicitly for every animation
  tasks:
    - Group by phase, use hierarchical numbering
    - Keep tasks completable in one session (prefer 1-3 files per task)
    - Tag tasks with [visual], [animation], [ux], [responsive]
  apply:
    - Follow existing code patterns (Astro components, Tailwind utilities, CSS custom properties)
    - Maintain Persona 5 visual consistency (colors, fonts, angular shapes)
    tdd: false
    test_command: ""
  verify:
    test_command: ""
    build_command: "npm run build"
    coverage_threshold: 0
  archive:
    - Warn before merging destructive deltas
    - Preserve animation timing docs in main specs
