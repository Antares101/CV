projects:
  - name: "LILO — Live Image Loader"
    description: >
      Servicio de snapshots en tiempo real de grado enterprise con Arquitectura Hexagonal.
      REST API con procesamiento async, adapters multi-proveedor (Tableau, Looker, Glyph),
      almacenamiento S3 con cache determinístico, store de procesos en Redis, y
      observabilidad completa. Sirve a 10k+ usuarios diarios con 99.9% uptime.
    tech: ["Node.js", "Express", "Redis", "PostgreSQL", "AWS S3", "Terraform", "Docker"]
    period: "Mar–May 2026"

  - name: "OCR Search Pipeline"
    description: >
      Transformé un cron OCR monolítico en un sistema de búsqueda production-grade.
      Tesseract.js con 8 workers concurrentes, búsqueda full-text en PostgreSQL con
      tsvector ponderado, materialized views con índices GIN. Reduje tiempo de búsqueda
      de 30s a 2s para 100k+ documentos.
    tech: ["Node.js", "Tesseract.js", "PostgreSQL", "Datadog", "Docker"]
    period: "Nov 2025–Ene 2026"

  - name: "Privacy Tracker"
    description: >
      Herramienta de auditoría de compliance consultando Databricks directamente. Búsqueda
      por Account/Session ID en 16 tablas con ejecución paralela, SQL dinámico con prevención
      de inyección, frontend con Zustand. Reduje tiempo de auditoría de 4 horas a 15 minutos.
    tech: ["Node.js", "React", "Zustand", "Databricks", "PostgreSQL"]
    period: "Oct–Dic 2025"

  - name: "AI Development Toolkit"
    description: >
      Sistema integral de desarrollo asistido por IA con 15+ skills personalizados,
